apiVersion: v1
kind: Pod
metadata:
  name: linear-regression-default
  annotations:
    task.type: "compute_intensive"
    task.size: "small"
    task.loc: "110"
spec:
  schedulerName: default-scheduler
  restartPolicy: Never
  containers:
  - name: linear-regression
    image: python:3.10-slim
    command: ["python", "-c"]
    args:
    - |
      import time
      import random
      start = time.time()
      print("Starting linear regression...")
      n = 10000
      x = [random.uniform(0, 100) for _ in range(n)]
      y = [2.5 * xi + random.gauss(0, 1) for xi in x]
      x_mean = sum(x) / n
      y_mean = sum(y) / n
      numerator = sum((x[i] - x_mean) * (y[i] - y_mean) for i in range(n))
      denominator = sum((x[i] - x_mean) ** 2 for i in range(n))
      slope = numerator / denominator
      intercept = y_mean - slope * x_mean
      end = time.time()
      print(f"Slope: {slope:.4f}")
      print(f"Intercept: {intercept:.4f}")
      print(f"Completion time: {end - start:.4f} seconds")
    resources:
      requests:
        cpu: "200m"
        memory: "128Mi"
      limits:
        cpu: "500m"
        memory: "256Mi"