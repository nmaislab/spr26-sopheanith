apiVersion: v1
kind: Pod
metadata:
  name: cnn-topsis
  annotations:
    task.type: "compute_intensive"
    task.size: "scalable"
    task.loc: "185"
spec:
  schedulerName: topsis-scheduler
  restartPolicy: Never
  containers:
  - name: cnn-inference
    image: python:3.10-slim
    command: ["python", "-c"]
    args:
    - |
      import time
      import random
      start = time.time()
      print("Starting CNN inference simulation...")
      def relu(x):
          return max(0, x)
      def conv_layer(input_size, filters, kernel=3):
          output = []
          for f in range(filters):
              feature_map = []
              for i in range(input_size - kernel + 1):
                  row = []
                  for j in range(input_size - kernel + 1):
                      val = sum(random.gauss(0, 1) for _ in range(kernel * kernel))
                      row.append(relu(val))
                  feature_map.append(row)
              output.append(feature_map)
          return output
      input_size = 32
      out1 = conv_layer(input_size, 8)
      out2 = conv_layer(input_size - 2, 16)
      out3 = conv_layer(input_size - 4, 32)
      flat_size = len(out3) * len(out3[0]) * len(out3[0][0])
      flat = [random.gauss(0, 1) for _ in range(flat_size)]
      weights = [random.gauss(0, 0.1) for _ in range(flat_size)]
      output = sum(f * w for f, w in zip(flat, weights))
      end = time.time()
      print(f"CNN output: {output:.4f}")
      print(f"Completion time: {end - start:.4f} seconds")
    resources:
      requests:
        cpu: "500m"
        memory: "256Mi"
      limits:
        cpu: "1000m"
        memory: "512Mi"